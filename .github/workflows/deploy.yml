name: Deploy React App to GoDaddy WordPress

on:
  push:
    branches:
      - main # Runs whenever you push to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Build Project
      run: npm run build

    - name: Prepare Assets for WordPress
      run: |
        # Move all contents of dist/assets/ to dist/
        mv dist/assets/* dist/ || true
        # Remove the empty dist/assets/ folder
        rm -rf dist/assets || true
        # Find the compiled index.js and rename to index.js
        find dist/ -name "index-*.js" -exec mv {} dist/index.js \;
        # Find the compiled index.css and rename to index.css
        find dist/ -name "index-*.css" -exec mv {} dist/index.css \;

    - name: SFTP Deploy to GoDaddy Production
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        server: ${{ secrets.SFTP_SERVER }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        port: 22
        local_path: './dist/'
        remote_path: 'html/wp-content/themes/astra/react-app/'
        sftp_only: true
