name: Deploy React App to GoDaddy WordPress

on:
  push:
    branches:
      - main # Runs whenever you push to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Build Project
      run: npm run build

    - name: Prepare Assets for WordPress
      run: |
        # Find the compiled index.js and rename to index.js
        find dist/assets -name "index-*.js" -exec mv {} dist/assets/index.js \;
        # Find the compiled index.css and rename to index.css
        find dist/assets -name "index-*.css" -exec mv {} dist/assets/index.css \;

    - name: SFTP Deploy to GoDaddy Production
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.SFTP_SERVER }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        port: 22
        protocol: sftp
        local-dir: ./dist/assets/
        # Adjust /wp-content/themes/astra/react-app/ if your theme folder is different
        server-dir: /wp-content/themes/astra/react-app/
